name: Ежедневное обновление ЧМ-2026

on:
  schedule:
    - cron: '0 8 * * *'     # Каждый день в 11:00 по Москве
  workflow_dispatch:        # Можно запускать вручную

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Важно! Право на запись

    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка библиотек
        run: pip install icalendar requests beautifulsoup4

      - name: Генерация календаря
        run: python update_calendar.py

      - name: Автоматический коммит и push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "♻️ Автообновление календаря ЧМ-2026 • Анализ + Winline + игроки"
          file_pattern: worldcup2026.ics
          commit_user_name: "WorldCup Bot"
          commit_user_email: "bot@github.com"
