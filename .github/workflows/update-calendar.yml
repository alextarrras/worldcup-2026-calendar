name: Daily World Cup 2026 Update

on:
  schedule:
    - cron: '0 9 * * *'  # Каждый день в 12:00 по МСК
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install icalendar requests beautifulsoup4 lxml

      - name: Run updater
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python update_calendar.py

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add worldcup2026.ics
          git commit -m "Автообновление: новый анализ и коэффициенты" || echo "No changes"
          git push